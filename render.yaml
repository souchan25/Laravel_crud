services:
  - type: web
    name: laravel-bug-tracker
    env: php
    plan: free
    buildCommand: "./build.sh"
    startCommand: "heroku-php-apache2 public/"
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: Bug Tracker
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: "https://your-app-url.onrender.com"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
